name: Opdater Grokipedia Nyheder

on:
  schedule:
    # Kører hvert 3. time (kl. 0, 3, 6, 9, 12, 15, 18, 21 UTC)
    - cron: "0 */3 * * *"
  workflow_dispatch: # Tillader manuel kørsel fra GitHub UI

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Sæt Python op
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Installer afhængigheder
        run: pip install -r requirements.txt

      - name: Hent nyheder og generer index.html
        run: python fetch_news.py

      - name: Commit og push index.html
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --cached --quiet; then
            echo "Ingen ændringer — springer commit over."
          else
            git commit -m "Auto-opdatering: $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
