<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grokipedia Nyheder</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f4f6f9; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
  .box { background: #fff; border-radius: 12px; padding: 40px; text-align: center; box-shadow: 0 2px 12px rgba(0,0,0,.08); max-width: 400px; }
  h1 { font-size: 20px; margin-bottom: 10px; }
  p { color: #6b7280; font-size: 14px; }
  .spin { font-size: 28px; animation: spin 1s linear infinite; display: inline-block; margin-bottom: 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
  <div class="box">
    <div class="spin">🌐</div>
    <h1>Grokipedia Nyheder</h1>
    <p>GitHub Actions er ved at hente de første nyheder.<br>
    Siden er klar inden for få minutter.</p>
  </div>
</body>
</html>
